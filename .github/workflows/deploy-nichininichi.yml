name: Deploy NichiNichi

on:
  push:
    branches: [master]
    paths:
      - 'nichininichi/**'
      - '.github/workflows/deploy-nichininichi.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nichininichi/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: nichininichi

      - name: Build
        run: npm run build
        working-directory: nichininichi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: nichininichi/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
