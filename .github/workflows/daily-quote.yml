name: Daily Inspirational Quote

on:
  schedule:
    # 10:00 AM KST = 01:00 UTC  |  change hour to match your timezone:
    #   PST (UTC-8): 18:00 UTC  |  EST (UTC-5): 15:00 UTC
    #   CET (UTC+1): 09:00 UTC  |  KST (UTC+9): 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:  # lets you trigger it manually to test

jobs:
  send-quote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Send daily quote
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/send_daily_quote.py
